name: Publish

# Tag conventions:
#   lib-v1.2.3   → publish the chunksplitter library crate to crates.io
#   cli-v1.2.3   → publish the chunksplitter-cli crate to crates.io
#
# The two crates are versioned independently.  When bumping the CLI you do not
# need to re-publish the lib (unless it also changed).  If you bump the lib AND
# the CLI in one go, push both tags; the jobs are independent.

on:
  push:
    tags:
      - "lib-v*"
      - "cli-v*"

env:
  CARGO_TERM_COLOR: always

jobs:
  publish-lib:
    name: Publish library crate
    if: startsWith(github.ref, 'refs/tags/lib-v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Publish chunksplitter
        run: cargo publish -p chunksplitter
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  publish-cli:
    name: Publish CLI crate
    if: startsWith(github.ref, 'refs/tags/cli-v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Publish chunksplitter-cli
        run: cargo publish -p chunksplitter-cli
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
