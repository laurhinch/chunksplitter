name: Publish

# Tag conventions:
#   lib-v1.2.3   → publish the chunksplitter library crate to crates.io
#   cli-v1.2.3   → publish the chunksplitter-cli crate to crates.io
#
# The two crates are versioned independently.  Push both tags together when
# releasing both; publish-cli will wait for publish-lib to complete first.

on:
  push:
    tags:
      - "lib-v*"
      - "cli-v*"

env:
  CARGO_TERM_COLOR: always

jobs:
  publish-lib:
    name: Publish library crate
    if: startsWith(github.ref, 'refs/tags/lib-v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Publish chunksplitter
        run: cargo publish -p chunksplitter
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  publish-cli:
    name: Publish CLI crate
    if: startsWith(github.ref, 'refs/tags/cli-v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Wait for lib crate to be available on crates.io
        run: |
          LIB_VERSION=$(grep '^version' lib/Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          echo "Waiting for chunksplitter $LIB_VERSION on crates.io..."
          for i in $(seq 1 20); do
            if cargo search chunksplitter --limit 1 | grep -q "\"$LIB_VERSION\""; then
              echo "Found chunksplitter $LIB_VERSION"
              exit 0
            fi
            echo "Attempt $i/20 — not yet available, waiting 30s..."
            sleep 30
          done
          echo "Timed out waiting for chunksplitter $LIB_VERSION"
          exit 1
      - name: Publish chunksplitter-cli
        run: cargo publish -p chunksplitter-cli
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
