name: Release CLI

on:
  push:
    tags:
      - "cli-v*"

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            artifact: chunksplitter-x86_64-linux
          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            artifact: chunksplitter-aarch64-linux
            use_cross: true
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: chunksplitter-x86_64-macos
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: chunksplitter-aarch64-macos
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: chunksplitter-x86_64-windows.exe

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install musl tools
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get install -y musl-tools

      - name: Install cross
        if: matrix.use_cross == true
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Build (cross)
        if: matrix.use_cross == true
        run: cross build --release -p chunksplitter-cli --target ${{ matrix.target }}

      - name: Build (cargo)
        if: matrix.use_cross != true
        run: cargo build --release -p chunksplitter-cli --target ${{ matrix.target }}

      - name: Stage artifact (Unix)
        if: matrix.os != 'windows-latest'
        run: cp target/${{ matrix.target }}/release/chunksplitter ${{ matrix.artifact }}

      - name: Stage artifact (Windows)
        if: matrix.os == 'windows-latest'
        run: cp target/${{ matrix.target }}/release/chunksplitter.exe ${{ matrix.artifact }}
        shell: pwsh

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
